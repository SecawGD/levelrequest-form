<body>

<div class="container">
    <h1>Track Status</h1>
    <div class="subtitle">Enter your Access Code to see the progress of your latest requested level.</div>
    
    <form id="trackForm">
        <div class="password-wrapper">
            <input type="password" id="codigo" required placeholder="Access Code">
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>
        <button type="submit" class="btn">Track Level ➔</button>
    </form>

    <div id="message"></div>

    <div id="resultContainer" class="tracking-result hidden">
        <div class="level-header">Level ID: <span id="displayLevelID" style="color: var(--accent-green);"></span></div>
        
        <div class="timeline" id="timeline">
            <div class="step" data-status="Pendiente">
                <div class="circle">✓</div>
                <div class="label">Pending</div>
            </div>
            <div class="step" data-status="Visto">
                <div class="circle">✓</div>
                <div class="label">Seen</div>
            </div>
            <div class="step" data-status="Revisandolo">
                <div class="circle">✓</div>
                <div class="label">Reviewing</div>
            </div>
            <div class="step" data-status="Finalizado">
                <div class="circle">✓</div>
                <div class="label">Finished</div>
            </div>
        </div>
    </div>
    
    <!-- CORRECCIÓN AQUÍ: Ruta relativa para regresar -->
    <a href="index.html" class="back-link">← Back to Request Form</a>
</div>

<script>
    const togglePassword = document.getElementById('togglePassword');
    const codigoInput = document.getElementById('codigo');

    togglePassword.addEventListener('click', () => {
        const type = codigoInput.getAttribute('type') === 'password' ? 'text' : 'password';
        codigoInput.setAttribute('type', type);
        
        if (type === 'text') {
            togglePassword.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        } else {
            togglePassword.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        }
    });

    const form = document.getElementById('trackForm');
    const messageDiv = document.getElementById('message');
    const resultContainer = document.getElementById('resultContainer');
    const displayLevelID = document.getElementById('displayLevelID');
    
    const statusOrder = ['Pendiente', 'Visto', 'Revisandolo', 'Finalizado'];

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        messageDiv.style.color = "var(--text-muted)";
        messageDiv.innerHTML = "Searching...";
        resultContainer.classList.add('hidden');

        const codigo = codigoInput.value;

        try {
            const response = await fetch('/.netlify/functions/track-status', {
                method: 'POST',
                body: JSON.stringify({ codigo })
            });
            const result = await response.json();
            
            if (response.ok) {
                messageDiv.innerHTML = "";
                displayLevelID.textContent = result.levelID;
                resultContainer.classList.remove('hidden');

                const currentStatus = result.estado;
                const statusIndex = statusOrder.indexOf(currentStatus) !== -1 ? statusOrder.indexOf(currentStatus) : 0; 
                
                const steps = document.querySelectorAll('.step');
                steps.forEach((step, index) => {
                    step.classList.remove('completed', 'current');
                    if (index < statusIndex) {
                        step.classList.add('completed');
                    } else if (index === statusIndex) {
                        if (currentStatus === 'Finalizado') {
                            step.classList.add('completed');
                        } else {
                            step.classList.add('current');
                        }
                    }
                });

            } else {
                messageDiv.style.color = "#ff4d4d";
                messageDiv.innerHTML = "❌ " + (result.error || "Not found.");
            }
        } catch (err) {
            messageDiv.style.color = "#ff4d4d";
            messageDiv.innerHTML = "❌ Connection error.";
        }
    });
</script>

</body>
</html>
