<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Level Status</title>
    <style>
        :root {
            --bg-main: #131b16; 
            --bg-input: #1a231d;
            --border-color: #2c3b31;
            --text-main: #e0e6e2;
            --text-muted: #8e9b92;
            --accent-green: #a0d175;
            --warning-red: #ff6b6b;
            --info-blue: #4dabf7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 3rem 1.5rem;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: var(--accent-green);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .header-subtext {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .question-group {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.3s ease-in-out;
        }

        .question-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .sub-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            margin-top: -0.2rem;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--text-muted);
            background-color: #1e2821;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 2.8rem;
        }

        .toggle-password {
            position: absolute;
            right: 0.8rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        .eye-icon {
            width: 20px;
            height: 20px;
        }

        .submit-btn {
            background-color: #000;
            color: var(--accent-green);
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: max-content;
        }

        .submit-btn:hover {
            opacity: 0.8;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        /* Result Card Styles */
        .result-card {
            margin-top: 2rem;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem 1.5rem 2.5rem 1.5rem;
            animation: fadeIn 0.4s ease-in-out;
        }

        .result-item {
            margin-bottom: 1rem;
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .result-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* --- Delivery Stepper CSS --- */
        .stepper-wrapper {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            position: relative;
        }

        .stepper-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            z-index: 1;
        }

        /* La línea conectora */
        .stepper-item::before {
            content: "";
            position: absolute;
            top: 8px; 
            left: -50%;
            width: 100%;
            height: 3px;
            background-color: var(--border-color);
            z-index: -1;
            transition: background-color 0.4s ease;
        }

        .stepper-item:first-child::before {
            content: none;
        }

        .step-counter {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: var(--bg-input);
            border: 3px solid var(--border-color);
            margin-bottom: 10px;
            transition: all 0.4s ease;
        }

        .step-name {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            transition: color 0.4s ease;
        }

        /* Estado COMPLETADO (Pasado) */
        .stepper-item.completed .step-counter {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }
        .stepper-item.completed::before {
            background-color: var(--accent-green);
        }
        .stepper-item.completed .step-name {
            color: var(--text-main);
        }

        /* Estado ACTIVO (Actual) */
        .stepper-item.active .step-counter {
            background-color: var(--bg-input);
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(160, 209, 117, 0.2);
        }
        .stepper-item.active::before {
            background-color: var(--accent-green);
        }
        .stepper-item.active .step-name {
            color: var(--accent-green);
        }

        /* --- Dynamic Description CSS --- */
        .status-description {
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            border-left: 3px solid var(--accent-green);
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.5;
            animation: fadeIn 0.4s ease-in-out;
        }

        #message {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            padding: 1rem;
            border-radius: 6px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Track Status</h1>
    <div class="header-subtext">Check the current status of your latest level request.</div>

    <form id="trackForm">
        <div class="question-group">
            <div class="question-title">Access Code <span style="color:var(--text-muted)">*</span></div>
            <div class="sub-text">Enter your private identity code.</div>
            <div class="password-wrapper">
                <input type="password" id="codigo" required>
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Check Status ➔</button>
        <div id="message" class="hidden"></div>
    </form>

    <div id="resultCard" class="result-card hidden">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div class="result-item">
                <div class="result-label">Level ID</div>
                <div class="result-value" id="resLevelID">---</div>
            </div>
            <div class="result-item" style="text-align: right;">
                <div class="result-label">Submitted On</div>
                <div class="result-value" id="resDate" style="font-weight: 400; color: var(--text-muted); font-size: 0.95rem;">---</div>
            </div>
        </div>

        <div class="stepper-wrapper" id="stepper">
            <div class="stepper-item" id="step-1">
                <div class="step-counter"></div>
                <div class="step-name">Pending</div>
            </div>
            <div class="stepper-item" id="step-2">
                <div class="step-counter"></div>
                <div class="step-name">Seen</div>
            </div>
            <div class="stepper-item" id="step-3">
                <div class="step-counter"></div>
                <div class="step-name">Reviewing</div>
            </div>
            <div class="stepper-item" id="step-4">
                <div class="step-counter"></div>
                <div class="step-name">Finished</div>
            </div>
        </div>

        <div id="statusDescription" class="status-description"></div>
    </div>

    <a href="index.html" class="back-link">← Back to Level Request</a>
</div>

<script>
    // Toggle Password Visibility
    const togglePassword = document.getElementById('togglePassword');
    const codigoInput = document.getElementById('codigo');

    togglePassword.addEventListener('click', () => {
        const type = codigoInput.getAttribute('type') === 'password' ? 'text' : 'password';
        codigoInput.setAttribute('type', type);
        
        if (type === 'text') {
            togglePassword.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        } else {
            togglePassword.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        }
    });

    // Descripciones dinámicas en inglés
    const stateDescriptions = [
        "I haven't seen your level yet. But your level was successfully sent to me and is already in my database!",
        "I have seen your request! Your level will be played by me shortly.",
        "I have already played your level, I am analyzing it, and preparing very detailed feedback for you.",
        "Your level has been reviewed. If you still haven't received the feedback, please wait a moment or contact me."
    ];

    // Form Submit Logic
    const form = document.getElementById('trackForm');
    const messageDiv = document.getElementById('message');
    const resultCard = document.getElementById('resultCard');
    const descBox = document.getElementById('statusDescription');
    const steps = [
        document.getElementById('step-1'),
        document.getElementById('step-2'),
        document.getElementById('step-3'),
        document.getElementById('step-4')
    ];

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const codigo = codigoInput.value;

        // Reset UI
        resultCard.classList.add('hidden');
        messageDiv.classList.remove('hidden');
        messageDiv.innerHTML = "Searching for your level...";
        messageDiv.style.color = "var(--text-main)";
        messageDiv.style.borderColor = "var(--border-color)";

        try {
            const response = await fetch('/track-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo })
            });
            
            const result = await response.json();
            
            if (response.ok) {
                // Ocultar mensaje de carga
                messageDiv.classList.add('hidden');
                
                // Mostrar datos básicos
                document.getElementById('resLevelID').textContent = result.levelID;
                document.getElementById('resDate').textContent = result.fecha || "Unknown date";
                
                // --- Lógica del Stepper ---
                const estado = (result.estado || 'pendiente').toLowerCase().trim();
                let currentStepIndex = 0; 
                
                if (estado === 'pendiente') currentStepIndex = 0;
                else if (estado === 'visto') currentStepIndex = 1;
                else if (estado === 'revisandolo') currentStepIndex = 2;
                else if (estado === 'finalizado') currentStepIndex = 3;

                // Actualizamos las clases CSS de cada puntito
                steps.forEach((step, index) => {
                    step.classList.remove('completed', 'active');
                    if (index < currentStepIndex) step.classList.add('completed');
                    else if (index === currentStepIndex) step.classList.add('active');
                });

                // Actualizamos la descripción
                descBox.textContent = stateDescriptions[currentStepIndex];

                resultCard.classList.remove('hidden');

            } else {
                messageDiv.style.color = "#ff4d4d";
                messageDiv.style.borderColor = "#ff4d4d";
                messageDiv.innerHTML = "❌ " + (result.error || "Error searching for level.");
            }
        } catch (err) {
            messageDiv.style.color = "#ff4d4d";
            messageDiv.style.borderColor = "#ff4d4d";
            messageDiv.innerHTML = "❌ Connection error.";
        }
    });
</script>

</body>
</html>
